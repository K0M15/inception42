# PID 1 stuff
background=NO

listen=YES
listen_ipv6=NO

local_enable=YES
write_enable=YES
local_umask=022

chroot_local_user=YES
allow_writeable_chroot=YES

pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30009
pasv_address=localhost

anonymous_enable=NO
xferlog_enable=YES
vsftpd_log_file=/var/log/vsftpd.log
seccomp_sandbox=NO
