# Bind to all interfaces (required for Docker networking)
bind 0.0.0.0

# Port to listen on
port 6379

# Disable protected mode to allow external connections
protected-mode no

# Caching settings for WordPress
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Disable daemon mode (run in foreground for Docker)
daemonize no
